services:
  backend:
    build: .
    container_name: backend_app
    ports:
      - "8080:8080"
    # This volume mapping connects your local files to the container
    # This is required for style.css to show up correctly
    volumes:
      - .:/app
    depends_on:
      - mongodb
    networks:
      - cloud-net

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    networks:
      - cloud-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - cloud-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - cloud-net

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    networks:
      - cloud-net

networks:
  cloud-net:
    driver: bridge

volumes:
  jenkins_home: