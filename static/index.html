<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDENT INFORMATION SYSTEM</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="announcement-bar">
        <div class="marquee">
            <span>Academic Year 2025-2026 Enrollment is Now Open</span>
            <span>Student Record System</span>
        </div>
    </div>

    <header class="main-header" id="mainHeader" style="display:none;">
        <div class="header-left">
            <h1>STUDENT SYSTEM</h1>
        </div>
        <div class="header-right">
            <a href="#" onclick="logout()">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </a>
        </div>
    </header>

    <nav class="sub-nav" id="subNav" style="display:none;">
        <a href="#" class="active">Student Directory</a> <span class="divider">|</span> <a href="#">University Portal</a>
    </nav>

    <div class="category-bar" id="catBar" style="display:none;">
        <button class="cat-btn active">ALL STUDENTS</button>
        <button class="cat-btn">BSA</button>
        <button class="cat-btn">BSBA</button>
        <button class="cat-btn">BSHM</button>
        <button class="cat-btn">BSCS</button>
        <button class="cat-btn">BSIT</button>
    </div>

    <main id="studentGrid" class="shop-grid" style="display:none;"></main>

    <div id="authModal" class="modal" style="display:flex;">
        <div class="modal-content">
            <h2 id="authTitle">ADMINISTRATOR LOGIN</h2>
            <input type="text" id="user" placeholder="USERNAME">
            <input type="password" id="pass" placeholder="PASSWORD">
            <button onclick="handleAuth()" id="authBtn" class="btn-black">SIGN IN</button>
            <p onclick="toggleAuth()" id="toggleLink" class="toggle-link">NEED AN ADMIN ACCOUNT? SIGN UP</p>
        </div>
    </div>

    <div id="adminPanel" class="admin-section" style="display:none;">
    <h2>ENROLL NEW STUDENT</h2>
    <input type="text" id="sName" placeholder="FULL NAME">
    
    <select id="sCourse" class="custom-select">
        <option value="" disabled selected>SELECT COURSE</option>
        <option value="BSA">BSA</option>
        <option value="BSBA">BSBA</option>
        <option value="BSHM">BSHM</option>
        <option value="BSIT">BSCS</option>
        <option value="BSCS">BSIT</option>
    </select>

    <select id="sYear" class="custom-select">
    <option value="" disabled selected>SELECT YEAR LEVEL</option>
    <option value="1">1ST YEAR</option>
    <option value="2">2ND YEAR</option>
    <option value="3">3RD YEAR</option>
    <option value="4">4TH YEAR</option>
</select>

    <input type="number" step="0.01" id="sGPA" placeholder="GPA">
    <button class="btn-black" onclick="saveStudent()">ADD TO DATABASE</button>
</div>

    <script src="/static/script.js"></script>
</body>
</html>
