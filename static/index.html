<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GGU Registrar | Console</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <h1>GOSSIP GIRLS UNIVERSITY</h1>
    <p>Registrar Management System</p>
</header>

<div class="container">
    <div class="glass-card">
        <div id="editLabel" style="display:none; color: var(--warning); font-weight: 800; font-size: 12px; margin-bottom: 15px;">MODE: EDITING RECORD</div>
        <div class="input-grid">
            <input type="hidden" id="oldName">
            <div class="input-field">
                <label>Student Full Name</label>
                <input type="text" id="name" placeholder="Enter name">
            </div>
            <div class="input-field">
                <label>Program</label>
                <select id="course">
                    <option value="BSA">BS Accountancy</option>
                    <option value="BSBA">BS Business Administration</option>
                    <option value="BSHM">BS Hospitality Management</option>
                    <option value="BSA">BS Accountancy</option>
                </select>
            </div>
            <div class="input-field">
                <label>Year Level</label>
                <select id="year">
                    <option value="1">1st Year</option>
                    <option value="2">2nd Year</option>
                    <option value="3">3rd Year</option>
                    <option value="4">4th Year</option>
                </select>
            </div>
            <button class="btn-main" id="submitBtn" onclick="handleSubmit()">ENROLL</button>
        </div>
    </div>

    <div id="studentList" class="student-grid"></div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
