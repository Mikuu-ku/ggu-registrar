<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDENT INFORMATION SYSTEM</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="announcement-bar">
        <div class="marquee">
            <span>Academic Year 2025-2026 Enrollment is Now Open</span>
            <span>Cloud Computing Final Project - Student Record System</span>
            <span>Support Hours: Mon - Sat | 24/7 Access</span>
        </div>
    </div>

    <header class="main-header">
        <div class="header-left">
            <h1 style="font-size: 18px;">STUDENT SYSTEM</h1>
        </div>
        <div class="header-right">
            <a href="#" onclick="showAdmin()"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></a>
        </div>
    </header>

    <nav class="sub-nav">
        <a href="#" class="active">Student Directory</a> <span class="divider">|</span> <a href="#">University Portal</a>
    </nav>

    <div class="category-bar">
        <button class="cat-btn active">ALL STUDENTS</button>
        <button class="cat-btn">BSIT</button>
        <button class="cat-btn">BSCS</button>
        <button class="cat-btn">BSCPE</button>
    </div>

    <main id="studentGrid" class="shop-grid"></main>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2 id="authTitle">LOG IN</h2>
            <input type="text" id="user" placeholder="ADMIN USERNAME">
            <input type="password" id="pass" placeholder="PASSWORD">
            <button onclick="handleAuth()" class="btn-black">CONTINUE</button>
            <p onclick="toggleAuth()" class="toggle-link">CREATE ADMIN ACCOUNT</p>
            <p onclick="closeModal()" class="close-x">CLOSE</p>
        </div>
    </div>

    <div id="adminPanel" class="admin-section" style="display:none;">
        <h2 style="margin-bottom: 20px; font-size: 14px;">ENROLL NEW STUDENT</h2>
        <input type="text" id="sName" placeholder="FULL NAME">
        <input type="text" id="sCourse" placeholder="COURSE (e.g., BSIT)">
        <input type="number" id="sYear" placeholder="YEAR LEVEL">
        <input type="number" step="0.01" id="sGPA" placeholder="GPA">
        <button class="btn-black" onclick="saveStudent()">ADD TO DATABASE</button>
        <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
